<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width" />
  <title>To Do List</title>
  <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg">
  <link rel="stylesheet" href="styles/main.css" />
  <script src="main.js" type="module"></script>
</head>

<body>
  <div class="todo" data-js-todo>
    <h1 class="todo__title">To Do List</h1>
    <form class="todo__form" data-js-todo-new-task-form>
      <div class="todo__field field">
        <label
            class="field__label"
            for="new-task"
        >
          Add new task
        </label>
        <input
            class="field__input"
            id="new-task"
            placeholder=" "
            autocomplete="off"
            data-js-todo-new-task-input
        />
      </div>
      <button class="button" type="submit" >Add</button>
    </form>
    <button class="button button__toggle-all" title="Toggle all tasks" data-js-todo-check-all-button>Toggle all tasks</button>
    <div class="todo__info">
      <div class="todo__total-tasks">
        <span data-js-todo-total-tasks>0 tasks left</span>
      </div>
      <div class="todo__filter-buttons todo__filter-buttons" data-js-todo-filter-buttons>
        <button
            class="todo__filter-button active"
            type="button"
            data-filter="all"
            data-js-todo-filter-button
        >
          All
        </button>
        <button
            class="todo__filter-button"
            type="button"
            data-filter="active"
            data-js-todo-filter-button
        >
          Active
        </button>
        <button
            class="todo__filter-button"
            type="button"
            data-filter="completed"
            data-js-todo-filter-button
        >
          Completed
        </button>
      </div>
      <button
          class="todo__delete-button"
          type="button"
          data-js-todo-delete-button
      >
        Clear completed
      </button>
    </div>
    <ul class="todo__list" data-js-todo-list></ul>
    <p class="todo__edit-hint">Double-click a task to edit it</p>
  </div>
</body>
